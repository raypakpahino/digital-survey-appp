<!doctype html>
<html lang="en" class="dark h-screen w-screen overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital Survey Platform</title>

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        overflow: hidden !important;
        position: fixed;
        inset: 0;
        transition: background-color 0.25s ease, color 0.25s ease;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* =============================================================
         1. DARK MODE DEFAULTS (When html has class .dark)
         ============================================================= */
      html.dark, html.dark body {
        background-color: #020617 !important;
        color: #f8fafc !important;
      }

      /* =============================================================
         2. LIGHT MODE OVERRIDES (When html does NOT have class .dark)
         ============================================================= */
      
      /* Main Page & Canvas Background */
      html:not(.dark), 
      html:not(.dark) body,
      html:not(.dark) main {
        background-color: #f8fafc !important;
        color: #0f172a !important;
      }

      /* Header Bar */
      html:not(.dark) header {
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05) !important;
      }

      /* Sidebar (Deep Navy Accent) */
      html:not(.dark) aside {
        background-color: #0b132b !important;
        border-color: #1c2541 !important;
        color: #f8fafc !important;
      }
      html:not(.dark) aside * {
        border-color: #1c2541 !important;
      }
      html:not(.dark) aside button:not(.bg-cyan-600) {
        color: #cbd5e1 !important;
      }
      html:not(.dark) aside button:not(.bg-cyan-600):hover {
        background-color: #1c2541 !important;
        color: #ffffff !important;
      }

      /* Card Containers & Boxes (Transform from dark slate to crisp white) */
      html:not(.dark) div[class*="bg-slate-900"],
      html:not(.dark) div[class*="bg-slate-950"],
      html:not(.dark) button[class*="bg-slate-950"],
      html:not(.dark) div[class*="bg-slate-800"] {
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -2px rgba(0, 0, 0, 0.03) !important;
      }

      /* Headings (h1, h2, h3, h4) */
      html:not(.dark) h1,
      html:not(.dark) h2,
      html:not(.dark) h3,
      html:not(.dark) h4,
      html:not(.dark) .text-white {
        color: #0f172a !important;
      }

      /* Secondary Subtitles & Descriptions */
      html:not(.dark) p,
      html:not(.dark) .text-slate-300,
      html:not(.dark) .text-slate-400,
      html:not(.dark) .text-slate-500 {
        color: #475569 !important;
      }

      /* Form Inputs & Select Boxes */
      html:not(.dark) input[type="text"],
      html:not(.dark) input[type="date"],
      html:not(.dark) input[type="password"],
      html:not(.dark) select {
        background-color: #f1f5f9 !important;
        color: #0f172a !important;
        border-color: #cbd5e1 !important;
      }

      /* Buttons inside Light Cards */
      html:not(.dark) .bg-slate-950,
      html:not(.dark) .bg-slate-900 {
        background-color: #f1f5f9 !important;
        color: #0f172a !important;
        border-color: #e2e8f0 !important;
      }
      html:not(.dark) .bg-slate-950:hover,
      html:not(.dark) .bg-slate-900:hover {
        background-color: #e2e8f0 !important;
      }

      /* Preserve Vibrant Accent Buttons */
      html:not(.dark) .bg-cyan-600,
      html:not(.dark) .bg-cyan-500 {
        background-color: #0891b2 !important;
        color: #ffffff !important;
      }
      html:not(.dark) .bg-emerald-600,
      html:not(.dark) .bg-emerald-500 {
        background-color: #059669 !important;
        color: #ffffff !important;
      }

      /* Custom Scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      html.dark ::-webkit-scrollbar-track { background: #090d16; }
      html.dark ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      html:not(.dark) ::-webkit-scrollbar-track { background: #f1f5f9; }
      html:not(.dark) ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
  </head>
  <body class="antialiased overflow-hidden h-screen w-screen m-0 p-0">
    <div id="app" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
