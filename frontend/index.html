<!doctype html>
<html lang="en" class="dark h-screen w-screen overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital Survey Platform</title>

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        overflow: hidden !important;
        position: fixed;
        inset: 0;
        transition: background-color 0.25s ease, color 0.25s ease;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* =============================================================
         1. DARK MODE DEFAULTS
         ============================================================= */
      html.dark, html.dark body {
        background-color: #020617 !important;
        color: #f8fafc !important;
      }

      html.dark *,
      html.dark hr,
      html.dark header,
      html.dark aside,
      html.dark [class*="border-"] {
        border-color: #1e293b !important;
      }

      /* =============================================================
         2. SODEXO LIGHT MODE OVERRIDES (CONTRAST FIXES FOR BUTTONS)
         ============================================================= */
      
      /* Base Canvas */
      html:not(.dark), 
      html:not(.dark) body,
      html:not(.dark) #app,
      html:not(.dark) main {
        background-color: #f4f6fa !important;
        color: #0f172a !important;
      }

      /* Top Header */
      html:not(.dark) header {
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
        box-shadow: 0 2px 4px 0 rgba(26, 43, 108, 0.04) !important;
      }

      /* Sodexo Deep Navy Sidebar */
      html:not(.dark) aside {
        background-color: #1a2b6c !important;
        border-color: #121e52 !important;
        color: #ffffff !important;
      }
      html:not(.dark) aside * {
        border-color: #24388a !important;
      }
      html:not(.dark) aside .bg-cyan-600 {
        background-color: #e31b23 !important;
        color: #ffffff !important;
      }
      html:not(.dark) aside span {
        color: #ffffff !important;
        opacity: 1 !important;
      }
      html:not(.dark) aside button {
        color: #dbe0f6 !important;
      }
      html:not(.dark) aside button:hover {
        background-color: #24388a !important;
        color: #ffffff !important;
      }
      html:not(.dark) aside button.bg-cyan-600 {
        background-color: #e31b23 !important;
        color: #ffffff !important;
        box-shadow: 0 4px 10px rgba(227, 27, 35, 0.3) !important;
      }
      html:not(.dark) aside div[class*="bg-slate-900"] {
        background-color: #121e52 !important;
      }

      /* White Cards & Panels */
      html:not(.dark) main [class*="bg-slate-900"],
      html:not(.dark) main [class*="bg-slate-950"],
      html:not(.dark) main [class*="bg-slate-800"] {
        background-color: #ffffff !important;
        border-color: #cbd5e1 !important;
        box-shadow: 0 4px 16px -2px rgba(26, 43, 108, 0.06) !important;
      }

      /* Target Form Cards */
      html:not(.dark) main button[class*="bg-cyan-600\/10"] {
        background-color: #eef2ff !important;
        border-color: #1a2b6c !important;
      }
      html:not(.dark) main button[class*="bg-cyan-600\/10"] span {
        color: #1a2b6c !important;
        font-weight: 800 !important;
      }
      html:not(.dark) main button[class*="bg-slate-950\/40"] {
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
      }
      html:not(.dark) main button[class*="bg-slate-950\/40"] span {
        color: #475569 !important;
      }

      /* Inner Sub-Slots & Legend Containers */
      html:not(.dark) main [class*="bg-slate-950\/"],
      html:not(.dark) main [class*="bg-slate-900\/"] {
        background-color: #f8fafc !important;
        border-color: #e2e8f0 !important;
      }

      /* Text Colors */
      html:not(.dark) main h1,
      html:not(.dark) main h2,
      html:not(.dark) main h3,
      html:not(.dark) main h4,
      html:not(.dark) main h5,
      html:not(.dark) main h6,
      html:not(.dark) main .text-white,
      html:not(.dark) main [class*="text-slate-100"],
      html:not(.dark) main [class*="text-slate-200"],
      html:not(.dark) main [class*="text-slate-300"] {
        color: #1a2b6c !important;
      }

      /* Question Sub-Headings & Red Accent */
      html:not(.dark) main [class*="text-cyan-400"],
      html:not(.dark) main [class*="text-cyan-300"] {
        color: #e31b23 !important;
        font-weight: 700 !important;
      }
      html:not(.dark) main .border-cyan-500 {
        border-color: #e31b23 !important;
      }

      html:not(.dark) main p,
      html:not(.dark) main [class*="text-slate-400"],
      html:not(.dark) main [class*="text-slate-500"] {
        color: #475569 !important;
      }

      /* Chart Donut Center */
      html:not(.dark) main .absolute.rounded-full {
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
      }
      html:not(.dark) main .absolute.rounded-full span {
        color: #1a2b6c !important;
        font-weight: 800 !important;
      }

      /* Entry Counter Badges */
      html:not(.dark) main span[class*="bg-slate-900"] {
        background-color: #f1f5f9 !important;
        color: #1a2b6c !important;
        border-color: #cbd5e1 !important;
        font-weight: 700 !important;
      }

      /* Inputs */
      html:not(.dark) main input,
      html:not(.dark) main select,
      html:not(.dark) main textarea {
        background-color: #ffffff !important;
        color: #0f172a !important;
        border-color: #cbd5e1 !important;
      }

      /* -------------------------------------------------------------
         CRITICAL BUTTON & TEXT CONTRAST OVERRIDES
         ------------------------------------------------------------- */
      
      /* Active Buttons ("Analytics", "All", "+ Create New Form") */
      html:not(.dark) main [class*="bg-cyan-600"],
      html:not(.dark) main [class*="bg-cyan-500"] {
        background-color: #1a2b6c !important;
        color: #ffffff !important;
        border-color: #1a2b6c !important;
      }
      html:not(.dark) main [class*="bg-cyan-600"] *,
      html:not(.dark) main [class*="bg-cyan-500"] * {
        color: #ffffff !important; /* Forces inner spans/icons to pure white */
      }

      /* Inactive Filter Buttons ("Log Matrix", "Today", "7 Days", "30 Days") */
      html:not(.dark) main button[class*="bg-slate-"]:not([class*="bg-cyan-600"]) {
        background-color: #f1f5f9 !important;
        color: #1a2b6c !important;
        border-color: #cbd5e1 !important;
        font-weight: 700 !important;
      }
      html:not(.dark) main button[class*="bg-slate-"]:not([class*="bg-cyan-600"]) * {
        color: #1a2b6c !important;
      }
      html:not(.dark) main button[class*="bg-slate-"]:not([class*="bg-cyan-600"]):hover {
        background-color: #e2e8f0 !important;
      }

      /* Export CSV Button */
      html:not(.dark) [class*="bg-emerald-600"],
      html:not(.dark) [class*="bg-emerald-500"] {
        background-color: #059669 !important;
        color: #ffffff !important;
      }
      html:not(.dark) [class*="bg-emerald-600"] *,
      html:not(.dark) [class*="bg-emerald-500"] * {
        color: #ffffff !important;
      }

      /* Clear All Danger Button */
      html:not(.dark) [class*="bg-rose-"] {
        background-color: #e31b23 !important; /* Sodexo Red */
        color: #ffffff !important;
        border-color: #e31b23 !important;
      }
      html:not(.dark) [class*="bg-rose-"] * {
        color: #ffffff !important; /* Fixes invisible Clear All text */
      }
      html:not(.dark) [class*="bg-rose-"]:hover {
        background-color: #c8141a !important;
      }

      /* Tablet Site Filter Pills */
      html:not(.dark) main button[class*="bg-emerald-950"],
      html:not(.dark) main button[class*="bg-slate-950"] {
        background-color: #f1f5f9 !important;
        color: #1a2b6c !important;
        border-color: #cbd5e1 !important;
        font-weight: 700 !important;
      }

      /* Custom Scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      html.dark ::-webkit-scrollbar-track { background: #090d16; }
      html.dark ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      html:not(.dark) ::-webkit-scrollbar-track { background: #e2e8f0; }
      html:not(.dark) ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    </style>
  </head>
  <body class="antialiased overflow-hidden h-screen w-screen m-0 p-0">
    <div id="app" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
