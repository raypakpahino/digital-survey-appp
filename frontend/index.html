<!doctype html>
<html lang="en" class="dark h-screen w-screen overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital Survey Platform</title>

    <!-- 1. TAILWIND CONFIGURATION (MUST BE BEFORE TAILWIND SCRIPT) -->
    <script>
      tailwind = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              navy: {
                950: '#0B132B',
                900: '#1C2541',
                800: '#2A365B',
                700: '#3A4B7C',
              }
            }
          }
        }
      }
    </script>

    <!-- 2. TAILWIND CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- 3. PREMIUM FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        overflow: hidden !important;
        position: fixed;
        inset: 0;
      }

      /* DYNAMIC LIGHT/DARK BACKGROUND ENFORCEMENT */
      html.dark, html.dark body {
        background-color: #020617 !important;
        color: #f8fafc !important;
      }

      html:not(.dark), html:not(.dark) body {
        background-color: #f8fafc !important;
        color: #0b132b !important;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* SCROLLBAR CUSTOMIZATION */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      html.dark ::-webkit-scrollbar-track {
        background: #090d16;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 4px;
      }
      html:not(.dark) ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      html:not(.dark) ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased overflow-hidden h-screen w-screen m-0 p-0 transition-colors duration-300">
    <div id="app" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
