<!doctype html>
<html lang="en" class="dark h-screen w-screen overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital Survey Platform</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      /* COLOR VARIABLES FOR LIGHT AND DARK MODES */
      :root {
        /* LIGHT MODE (DOMINANT WHITE + DEEP NAVY ACCENTS) */
        --bg-main: #f8fafc;        /* Main background */
        --bg-card: #ffffff;        /* Cards & Container boxes */
        --bg-inner: #f1f5f9;       /* Inner inputs / dark slots */
        --bg-sidebar: #0b132b;    /* Navy Sidebar */
        --border-color: #e2e8f0;   /* Borders */
        --text-primary: #0f172a;   /* Primary Headings */
        --text-secondary: #475569; /* Subtitles & labels */
        --text-muted: #94a3b8;     /* Small specs */
        --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      }

      html.dark {
        /* DARK MODE */
        --bg-main: #020617;
        --bg-card: #0f172a;
        --bg-inner: #020617;
        --bg-sidebar: #0f172a;
        --border-color: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      }
      
      html, body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-main) !important;
        color: var(--text-primary) !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
        position: fixed;
        inset: 0;
        transition: background-color 0.25s ease, color 0.25s ease;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* GLOBAL UTILITY OVERRIDES FOR CSS VARIABLE THEMING */
      .theme-bg-main { background-color: var(--bg-main) !important; }
      .theme-bg-card { background-color: var(--bg-card) !important; }
      .theme-bg-inner { background-color: var(--bg-inner) !important; }
      .theme-bg-sidebar { background-color: var(--bg-sidebar) !important; }
      .theme-border { border-color: var(--border-color) !important; }
      .theme-text-primary { color: var(--text-primary) !important; }
      .theme-text-secondary { color: var(--text-secondary) !important; }
      .theme-text-muted { color: var(--text-muted) !important; }
      .theme-shadow { box-shadow: var(--card-shadow) !important; }

      /* SCROLLBARS */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      html.dark ::-webkit-scrollbar-track { background: #090d16; }
      html.dark ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      html:not(.dark) ::-webkit-scrollbar-track { background: #f1f5f9; }
      html:not(.dark) ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
  </head>
  <body class="antialiased overflow-hidden h-screen w-screen m-0 p-0">
    <div id="app" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
