<!doctype html>
<html lang="en" class="bg-slate-950 text-slate-100 overflow-hidden h-screen w-screen">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital Survey Platform</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Forms Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #020617 !important; /* Slate 950 Dark Background */
        color: #f8fafc;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        overflow: hidden !important;
        position: fixed;
        inset: 0;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #020617;
      }

      /* Custom scrollbars for inside scrollable areas */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #090d16;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased overflow-hidden h-screen w-screen m-0 p-0">
    <div id="app" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
