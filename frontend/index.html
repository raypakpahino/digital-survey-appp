<!doctype html>
<html lang="en" class="dark h-screen w-screen overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Digital Survey Platform</title>

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
        position: fixed;
        inset: 0;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      /* -------------------------------------------------------------
         GLOBAL LIGHT MODE AUTOMATIC OVERRIDES (When html lacks .dark)
         ------------------------------------------------------------- */
      html:not(.dark), 
      html:not(.dark) body {
        background-color: #f8fafc !important; /* Soft Light Canvas */
        color: #0f172a !important;
      }

      /* Transform Dark Containers/Boxes to Clean White Cards */
      html:not(.dark) .bg-slate-900,
      html:not(.dark) .bg-slate-950,
      html:not(.dark) .bg-slate-900\/90,
      html:not(.dark) .bg-slate-950\/60,
      html:not(.dark) .bg-slate-950\/80,
      html:not(.dark) .bg-slate-950\/40 {
        background-color: #ffffff !important;
        color: #0f172a !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05) !important;
      }

      /* Deep Navy Sidebar in Light Mode */
      html:not(.dark) aside,
      html:not(.dark) aside .bg-slate-900 {
        background-color: #0b132b !important;
        color: #f8fafc !important;
      }

      /* Light Borders for Cards & Inputs */
      html:not(.dark) .border-slate-800,
      html:not(.dark) .border-slate-800\/80,
      html:not(.dark) .border-slate-800\/60,
      html:not(.dark) .border-slate-800\/40,
      html:not(.dark) .border-slate-900 {
        border-color: #e2e8f0 !important;
      }

      /* Text Colors in Light Mode */
      html:not(.dark) .text-white {
        color: #0f172a !important;
      }
      html:not(.dark) .text-slate-100,
      html:not(.dark) .text-slate-200,
      html:not(.dark) .text-slate-300 {
        color: #334155 !important;
      }
      html:not(.dark) .text-slate-400,
      html:not(.dark) .text-slate-500 {
        color: #64748b !important;
      }

      /* Form Controls & Inputs */
      html:not(.dark) input[type="text"],
      html:not(.dark) input[type="date"],
      html:not(.dark) input[type="password"],
      html:not(.dark) select {
        background-color: #f1f5f9 !important;
        color: #0f172a !important;
        border-color: #cbd5e1 !important;
      }

      /* Dark Mode Canvas Defaults */
      html.dark, html.dark body {
        background-color: #020617 !important;
        color: #f8fafc !important;
      }

      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Custom Scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      html.dark ::-webkit-scrollbar-track { background: #090d16; }
      html.dark ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      html:not(.dark) ::-webkit-scrollbar-track { background: #f1f5f9; }
      html:not(.dark) ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
  </head>
  <body class="antialiased overflow-hidden h-screen w-screen m-0 p-0">
    <div id="app" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
